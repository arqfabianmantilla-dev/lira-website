<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hábitos · LIRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0F0E0B;
      --surface: #161410;
      --surface2: #1E1C18;
      --border: #2A2620;
      --text: #C9B99A;
      --text-dim: #6B5E4E;
      --text-faint: #3A3020;
      --cocinar: #C17F3E;
      --leer: #4A7B6F;
      --dibujar: #7B6FAA;
      --ejercicio: #6F8FAA;
      --arquitectura: #AA6F6F;
      --ciclismo: #5A9E6F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* HEADER */
    .header {
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-left {}
    .header-studio {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.5px;
    }
    .header-date {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
    }

    /* NAV */
    .nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .nav-btn {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .nav-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* VIEWS */
    .view { display: none; padding: 24px 20px 0; }
    .view.active { display: block; }

    /* TODAY */
    .view-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .habit-row {
      display: flex;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #1A1814;
      cursor: pointer;
      transition: opacity .15s;
    }
    .habit-row:active { opacity: .6; }
    .habit-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-right: 14px;
      flex-shrink: 0;
      transition: all .3s;
    }
    .habit-icon.done {
      background: color-mix(in srgb, var(--color) 15%, transparent);
      border-color: var(--color);
      color: var(--color);
    }
    .habit-info { flex: 1; }
    .habit-name { font-size: 15px; color: var(--text-dim); transition: color .2s; }
    .habit-name.done { color: var(--text); }
    .habit-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; opacity: .7; }
    .habit-check { font-size: 18px; color: var(--border); transition: color .2s; }
    .habit-check.done { color: var(--color); }

    /* WEEK */
    .week-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      border-radius: 1px;
      transition: all .2s;
    }
    .filter-btn.active {
      border-color: var(--text);
      color: var(--text);
    }
    .week-table { width: 100%; border-collapse: collapse; }
    .week-table th {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 12px;
      font-weight: 400;
    }
    .week-table td { padding: 8px 3px; text-align: center; }
    .week-table .habit-label {
      text-align: left;
      font-size: 11px;
      color: var(--text-dim);
      padding-right: 8px;
      white-space: nowrap;
    }
    .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #1A1814;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      font-size: 11px;
      color: var(--border);
      transition: all .2s;
    }
    .dot.done {
      background: color-mix(in srgb, var(--color) 20%, transparent);
      border-color: var(--color);
      color: var(--color);
    }

    /* STATS */
    .stats-card {
      padding: 20px 0;
      border-bottom: 1px solid #1A1814;
    }
    .stats-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .stats-icon { font-size: 18px; margin-right: 10px; }
    .stats-name { font-size: 15px; }
    .stats-numbers { display: flex; gap: 28px; }
    .stat-item {}
    .stat-value { font-size: 24px; }
    .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* CYCLING CHART */
    .chart-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .chart-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .chart-wrap {
      position: relative;
      height: 140px;
      margin-bottom: 8px;
    }
    canvas#cyclingChart {
      width: 100%;
      height: 140px;
    }
    .chart-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .cycling-sessions {
      margin-top: 24px;
    }
    .session-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1A1814;
      gap: 12px;
    }
    .session-date { font-size: 11px; color: var(--text-dim); width: 80px; flex-shrink: 0; }
    .session-km { font-size: 18px; color: var(--ciclismo); width: 60px; flex-shrink: 0; }
    .session-km span { font-size: 10px; color: var(--text-dim); }
    .session-info { flex: 1; font-size: 12px; color: var(--text-dim); line-height: 1.4; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      padding: 28px 24px 40px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-icon { font-size: 22px; margin-right: 12px; }
    .modal-name { font-size: 17px; }
    .modal-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      border-radius: 1px;
    }
    .field input:focus, .field textarea:focus { border-color: var(--text-dim); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-save {
      flex: 2;
      padding: 14px;
      border: 1px solid;
      background: transparent;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .75; }
    .btn-delete {
      flex: 1;
      padding: 14px;
      border: 1px solid #3A2020;
      background: none;
      color: #6B4040;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    /* HISTORY */
    .heatmap-section { margin-bottom: 28px; }
    .heatmap-habit-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .heatmap-habit-icon { font-size: 15px; margin-right: 8px; }
    .heatmap-habit-name { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
    .heatmap-habit-total { margin-left: auto; font-size: 11px; color: var(--text-faint); }
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .heatmap-day-label {
      font-size: 8px;
      color: var(--text-faint);
      text-align: center;
      padding-bottom: 4px;
    }
    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      cursor: pointer;
      transition: transform .1s;
      position: relative;
    }
    .heatmap-cell:active { transform: scale(.9); }
    .heatmap-cell.empty { background: transparent; cursor: default; }
    .heatmap-cell.inactive { background: var(--surface2); }
    .heatmap-cell.today-cell { outline: 1px solid var(--text-dim); }
    .history-summary {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .history-summary-item { text-align: center; flex: 1; }
    .history-summary-value { font-size: 22px; color: var(--text); }
    .history-summary-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-studio">LIRA · Estudio</div>
    <div class="header-title">Registro de hábitos</div>
  </div>
  <div class="header-date" id="header-date"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showView('today')">Hoy</button>
  <button class="nav-btn" onclick="showView('week')">Semana</button>
  <button class="nav-btn" onclick="showView('stats')">Resumen</button>
  <button class="nav-btn" onclick="showView('cycling')">Ciclismo</button>
  <button class="nav-btn" onclick="showView('history')">Historial</button>
</div>

<!-- TODAY VIEW -->
<div class="view active" id="view-today">
  <div class="view-label" id="today-label"></div>
  <div id="today-list"></div>
</div>

<!-- WEEK VIEW -->
<div class="view" id="view-week">
  <div class="view-label">Últimos 7 días</div>
  <div class="week-filter" id="week-filter"></div>
  <div style="overflow-x:auto;">
    <table class="week-table" id="week-table"></table>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view" id="view-stats">
  <div class="view-label">Resumen general</div>
  <div id="stats-list"></div>
</div>

<!-- CYCLING VIEW -->
<div class="view" id="view-cycling">
  <div class="view-label">Ciclismo · Progresión</div>
  <div class="chart-section">
    <div class="chart-title">Kilómetros por sesión</div>
    <div class="chart-wrap">
      <canvas id="cyclingChart"></canvas>
    </div>
    <div class="chart-labels" id="chart-labels"></div>
  </div>
  <div class="cycling-sessions" id="cycling-sessions"></div>
</div>

<!-- HISTORY VIEW -->
<div class="view" id="view-history">
  <div class="view-label" id="history-view-label">Historial mensual</div>

  <!-- Toggle mes / año -->
  <div style="display:flex;gap:6px;margin-bottom:20px;">
    <button id="toggle-month" onclick="setHistoryMode('month')" style="flex:1;padding:8px;background:none;border:1px solid var(--text);color:var(--text);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;">Mes</button>
    <button id="toggle-year" onclick="setHistoryMode('year')" style="flex:1;padding:8px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;">Año completo</button>
  </div>

  <!-- Navegación mes -->
  <div id="month-nav" style="display:flex;gap:8px;margin-bottom:28px;align-items:center;">
    <button onclick="changeMonth(-1)" style="background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">‹</button>
    <div style="flex:1;text-align:center;">
      <div id="history-month-label" style="font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;"></div>
    </div>
    <button onclick="changeMonth(1)" style="background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">›</button>
  </div>

  <!-- Navegación año -->
  <div id="year-nav" style="display:none;gap:8px;margin-bottom:28px;align-items:center;">
    <button onclick="changeYear(-1)" style="background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">‹</button>
    <div style="flex:1;text-align:center;">
      <div id="history-year-label" style="font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;"></div>
    </div>
    <button onclick="changeYear(1)" style="background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">›</button>
  </div>

  <div id="history-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" style="position:relative;">
    <button class="btn-close" onclick="closeModalDirect()">×</button>
    <div class="modal-header">
      <div class="modal-icon" id="m-icon"></div>
      <div>
        <div class="modal-name" id="m-name"></div>
        <div class="modal-date" id="m-date"></div>
      </div>
    </div>
    <div id="m-fields"></div>
    <div class="modal-actions">
      <button class="btn-delete" id="m-delete" onclick="deleteEntry()" style="display:none;">Borrar</button>
      <button class="btn-save" id="m-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<script>
const HABITS = [
  { id:'cocinar',       label:'Cocinar',       icon:'◈', color:'#C17F3E', fields:[{key:'minutes',label:'Minutos',type:'number',placeholder:'30'},{key:'content',label:'Qué preparaste',type:'text',placeholder:'Pasta al pesto...'}] },
  { id:'leer',          label:'Leer',          icon:'◻', color:'#4A7B6F', fields:[{key:'minutes',label:'Minutos',type:'number',placeholder:'30'},{key:'content',label:'Qué leíste',type:'text',placeholder:'Título del libro...'}] },
  { id:'dibujar',       label:'Dibujar',       icon:'◇', color:'#7B6FAA', fields:[{key:'minutes',label:'Minutos',type:'number',placeholder:'30'},{key:'content',label:'Qué dibujaste',type:'text',placeholder:'Boceto de...'}] },
  { id:'ejercicio',     label:'Ejercicio',     icon:'◎', color:'#6F8FAA', fields:[{key:'minutes',label:'Minutos',type:'number',placeholder:'45'},{key:'content',label:'Tipo de ejercicio',type:'text',placeholder:'Caminata, pesas...'}] },
  { id:'arquitectura',  label:'Arquitectura',  icon:'⬡', color:'#AA6F6F', fields:[{key:'minutes',label:'Minutos',type:'number',placeholder:'60'},{key:'content',label:'En qué trabajaste',type:'text',placeholder:'Proyecto...'}] },
  { id:'ciclismo',      label:'Ciclismo',      icon:'◉', color:'#5A9E6F', fields:[{key:'km',label:'Kilómetros',type:'number',placeholder:'20'},{key:'minutes',label:'Duración (min)',type:'number',placeholder:'60'},{key:'content',label:'Ruta / Destino',type:'text',placeholder:'A dónde fuiste...'}] },
];

const WEEKDAYS = ['D','L','M','M','J','V','S'];

let db = {};
let currentModal = null;
let weekFilter = null;

function today() {
  return new Date().toISOString().split('T')[0];
}

function getLast7() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function formatDate(d) {
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function getEntry(habitId, date) {
  return db[date]?.[habitId] || null;
}

function saveDB() {
  localStorage.setItem('lira-habits-v2', JSON.stringify(db));
}

function loadDB() {
  try {
    const raw = localStorage.getItem('lira-habits-v2');
    if (raw) db = JSON.parse(raw);
  } catch(e) {}
}

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const idx = ['today','week','stats','cycling','history'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (name==='today') renderToday();
  if (name==='week') renderWeek();
  if (name==='stats') renderStats();
  if (name==='cycling') renderCycling();
  if (name==='history') renderHistory();
}

// ── TODAY ──
function renderToday() {
  const t = today();
  const done = HABITS.filter(h => getEntry(h.id, t)).length;
  document.getElementById('today-label').textContent = `Hoy · ${formatDate(t)} · ${done}/6`;

  const list = document.getElementById('today-list');
  list.innerHTML = '';
  HABITS.forEach(h => {
    const entry = getEntry(h.id, t);
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.onclick = () => openModal(h.id, t);

    const metaParts = [];
    if (entry?.minutes) metaParts.push(entry.minutes + ' min');
    if (entry?.km) metaParts.push(entry.km + ' km');
    if (entry?.content) metaParts.push(entry.content);

    row.innerHTML = `
      <div class="habit-icon ${entry?'done':''}" style="--color:${h.color}; color:${entry?h.color:'var(--text-faint)'}; border-color:${entry?h.color:'var(--border)'};">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name ${entry?'done':''}">${h.label}</div>
        ${entry ? `<div class="habit-meta">${metaParts.join(' · ')}</div>` : ''}
      </div>
      <div class="habit-check ${entry?'done':''}" style="color:${entry?h.color:'var(--border)'}">${entry?'✓':'○'}</div>
    `;
    list.appendChild(row);
  });
}

// ── WEEK ──
function renderWeek() {
  const last7 = getLast7();

  // Filter buttons
  const filterDiv = document.getElementById('week-filter');
  filterDiv.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (weekFilter===null?' active':'');
  allBtn.textContent = 'Todos';
  allBtn.onclick = () => { weekFilter=null; renderWeek(); };
  filterDiv.appendChild(allBtn);

  HABITS.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (weekFilter===h.id?' active':'');
    btn.textContent = h.label;
    btn.onclick = () => { weekFilter = weekFilter===h.id ? null : h.id; renderWeek(); };
    filterDiv.appendChild(btn);
  });

  const habits = weekFilter ? HABITS.filter(h=>h.id===weekFilter) : HABITS;
  const table = document.getElementById('week-table');
  table.innerHTML = '';

  // Header row
  const thead = document.createElement('tr');
  thead.innerHTML = '<th></th>' + last7.map(d => {
    const dayIdx = new Date(d+'T12:00:00').getDay();
    return `<th>${WEEKDAYS[dayIdx]}<br><span style="font-size:8px;opacity:.5">${d.split('-')[2]}</span></th>`;
  }).join('');
  table.appendChild(thead);

  habits.forEach(h => {
    const tr = document.createElement('tr');
    let cells = `<td class="habit-label">${h.label}</td>`;
    last7.forEach(d => {
      const entry = getEntry(h.id, d);
      cells += `<td><div class="dot ${entry?'done':''}" style="--color:${h.color}; ${entry?`background:color-mix(in srgb,${h.color} 20%,transparent);border-color:${h.color};color:${h.color}`:''};" onclick="openModal('${h.id}','${d}')">${entry?'✓':'·'}</div></td>`;
    });
    tr.innerHTML = cells;
    table.appendChild(tr);
  });
}

// ── STATS ──
function renderStats() {
  const list = document.getElementById('stats-list');
  list.innerHTML = '';

  // ── GRÁFICO ANUAL (primer plano) ──
  const currentYear = new Date().getFullYear();
  const chartDiv = document.createElement('div');
  chartDiv.style.marginBottom = '32px';
  chartDiv.innerHTML = `
    <div style="font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;">Actividad semanal · ${currentYear}</div>
    <canvas id="statsYearChart" style="width:100%;height:160px;display:block;"></canvas>
    <div id="statsChartMonthLabels" style="position:relative;height:14px;margin-top:6px;"></div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;margin-bottom:24px;" id="statsChartLegend"></div>
    <div style="height:1px;background:var(--border);margin-bottom:28px;"></div>
  `;
  list.appendChild(chartDiv);

  const legend = chartDiv.querySelector('#statsChartLegend');
  HABITS.forEach(h => {
    const item = document.createElement('div');
    item.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);';
    item.innerHTML = `<div style="width:10px;height:10px;border-radius:2px;background:${h.color};flex-shrink:0;"></div>${h.label}`;
    legend.appendChild(item);
  });

  // Weekly data
  const jan1 = new Date(currentYear, 0, 1);
  const startDay = new Date(jan1);
  const dow = startDay.getDay();
  startDay.setDate(startDay.getDate() - (dow === 0 ? 6 : dow - 1));
  const weeks = [];
  for (let w = 0; w < 54; w++) {
    const weekStart = new Date(startDay);
    weekStart.setDate(startDay.getDate() + w * 7);
    if (weekStart.getFullYear() > currentYear && weekStart.getMonth() > 0) break;
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    if (weekEnd.getFullYear() < currentYear) continue;
    if (weekStart.getFullYear() > currentYear) break;
    weeks.push({ start: weekStart, end: weekEnd });
  }
  const weekData = weeks.map(w => {
    const counts = {};
    HABITS.forEach(h => { counts[h.id] = 0; });
    for (let i = 0; i < 7; i++) {
      const d = new Date(w.start);
      d.setDate(w.start.getDate() + i);
      if (d.getFullYear() !== currentYear) continue;
      const dateStr = d.toISOString().split('T')[0];
      HABITS.forEach(h => { if (db[dateStr]?.[h.id]) counts[h.id]++; });
    }
    return { ...w, counts };
  });
  const maxTotal = Math.max(...weekData.map(w => HABITS.reduce((s,h) => s + w.counts[h.id], 0)), 1);

  requestAnimationFrame(() => {
    const canvas = document.getElementById('statsYearChart');
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 320;
    const H = 160;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const padL = 24, padR = 8, padT = 12, padB = 8;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const barW = Math.max(2, (chartW / weeks.length) - 1);
    const gap = (chartW / weeks.length) - barW;

    [0, 0.5, 1].forEach(t => {
      const y = padT + chartH * (1 - t);
      ctx.fillStyle = '#3A3020'; ctx.font = '9px DM Sans'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxTotal * t), padL - 4, y + 3);
      ctx.strokeStyle = '#1E1C18'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    });

    weekData.forEach((w, i) => {
      const x = padL + i * (barW + gap);
      let stackY = padT + chartH;
      HABITS.forEach(h => {
        const val = w.counts[h.id];
        if (val === 0) return;
        const segH = Math.max(2, (val / maxTotal) * chartH);
        ctx.fillStyle = h.color; ctx.globalAlpha = 0.85;
        ctx.fillRect(x, stackY - segH, barW, segH);
        stackY -= segH;
      });
      ctx.globalAlpha = 1;
    });

    const labelsDiv = document.getElementById('statsChartMonthLabels');
    if (labelsDiv) {
      let lastMonth = -1;
      weekData.forEach((w, i) => {
        const m = w.start.getMonth();
        if (m !== lastMonth && w.start.getFullYear() === currentYear) {
          lastMonth = m;
          const span = document.createElement('span');
          span.style.cssText = 'position:absolute;font-size:8px;color:var(--text-dim);white-space:nowrap;left:' + (padL + i*(barW+gap)) + 'px;';
          span.textContent = MONTH_SHORT[m];
          labelsDiv.appendChild(span);
        }
      });
    }
  });

  // ── ESTADÍSTICAS POR HÁBITO ──
  HABITS.forEach(h => {
    let streak = 0;
    let d = new Date();
    while(true) {
      const key = d.toISOString().split('T')[0];
      if (getEntry(h.id, key)) streak++;
      else break;
      d.setDate(d.getDate()-1);
    }

    let totalMin = 0, totalKm = 0, sessions = 0;
    Object.values(db).forEach(day => {
      if (day[h.id]) {
        totalMin += parseInt(day[h.id].minutes)||0;
        totalKm += parseFloat(day[h.id].km)||0;
        sessions++;
      }
    });

    const card = document.createElement('div');
    card.className = 'stats-card';

    const hours = Math.floor(totalMin/60);
    const mins = totalMin%60;
    const timeStr = hours>0 ? `${hours}h ${mins}m` : `${mins}m`;

    card.innerHTML = `
      <div class="stats-header">
        <div class="stats-icon" style="color:${h.color}">${h.icon}</div>
        <div class="stats-name">${h.label}</div>
      </div>
      <div class="stats-numbers">
        <div class="stat-item">
          <div class="stat-value" style="color:${h.color}">${streak}</div>
          <div class="stat-label">Racha</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${timeStr}</div>
          <div class="stat-label">Tiempo total</div>
        </div>
        ${h.id==='ciclismo' ? `<div class="stat-item"><div class="stat-value" style="color:${h.color}">${totalKm.toFixed(0)}</div><div class="stat-label">km totales</div></div>` : ''}
        <div class="stat-item">
          <div class="stat-value">${sessions}</div>
          <div class="stat-label">Sesiones</div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

// ── CYCLING ──
function renderCycling() {
  const sessions = [];
  Object.entries(db).forEach(([date, day]) => {
    if (day.ciclismo) {
      sessions.push({ date, ...day.ciclismo });
    }
  });
  sessions.sort((a,b) => a.date.localeCompare(b.date));

  // Chart
  const canvas = document.getElementById('cyclingChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 320;
  const H = 140;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,W,H);

  const labels = document.getElementById('chart-labels');
  labels.innerHTML = '';

  if (sessions.length === 0) {
    ctx.fillStyle = '#3A3020';
    ctx.font = '13px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Aún no hay sesiones registradas', W/2, H/2);
    return;
  }

  const kms = sessions.map(s => parseFloat(s.km)||0);
  const maxKm = Math.max(...kms, 1);
  const padL = 32, padR = 16, padT = 16, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  // Grid lines
  ctx.strokeStyle = '#1E1C18';
  ctx.lineWidth = 1;
  [0, 0.25, 0.5, 0.75, 1].forEach(t => {
    const y = padT + chartH * (1-t);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W-padR, y);
    ctx.stroke();
    if (t > 0) {
      ctx.fillStyle = '#3A3020';
      ctx.font = '9px DM Sans';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxKm*t), padL-4, y+3);
    }
  });

  if (sessions.length === 1) {
    const x = padL + chartW/2;
    const y = padT + chartH * (1 - kms[0]/maxKm);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#5A9E6F';
    ctx.fill();
  } else {
    // Area fill
    ctx.beginPath();
    sessions.forEach((s, i) => {
      const x = padL + (i/(sessions.length-1))*chartW;
      const y = padT + chartH*(1-kms[i]/maxKm);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    const lastX = padL+chartW, firstX = padL;
    ctx.lineTo(lastX, padT+chartH);
    ctx.lineTo(firstX, padT+chartH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padT, 0, padT+chartH);
    grad.addColorStop(0, 'rgba(90,158,111,0.3)');
    grad.addColorStop(1, 'rgba(90,158,111,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    sessions.forEach((s, i) => {
      const x = padL + (i/(sessions.length-1))*chartW;
      const y = padT + chartH*(1-kms[i]/maxKm);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle = '#5A9E6F';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dots
    sessions.forEach((s, i) => {
      const x = padL + (i/(sessions.length-1))*chartW;
      const y = padT + chartH*(1-kms[i]/maxKm);
      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle = '#5A9E6F';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fillStyle = '#0F0E0B';
      ctx.fill();
    });
  }

  // X labels
  const maxLabels = Math.min(sessions.length, 6);
  const step = Math.floor(sessions.length/maxLabels) || 1;
  sessions.forEach((s, i) => {
    if (i % step === 0 || i === sessions.length-1) {
      const span = document.createElement('span');
      span.textContent = s.date.slice(5).replace('-','/');
      labels.appendChild(span);
    }
  });

  // Sessions list
  const sessDiv = document.getElementById('cycling-sessions');
  sessDiv.innerHTML = '<div style="font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:16px;">Historial de sesiones</div>';
  [...sessions].reverse().forEach(s => {
    const row = document.createElement('div');
    row.className = 'session-row';
    row.innerHTML = `
      <div class="session-date">${formatDate(s.date)}</div>
      <div class="session-km">${parseFloat(s.km||0).toFixed(1)}<span> km</span></div>
      <div class="session-info">
        ${s.minutes ? s.minutes+' min' : ''}
        ${s.minutes && s.content ? ' · ' : ''}
        ${s.content || ''}
      </div>
    `;
    sessDiv.appendChild(row);
  });
}

// ── MODAL ──
function openModal(habitId, date) {
  const h = HABITS.find(x=>x.id===habitId);
  const entry = getEntry(habitId, date);
  currentModal = { habitId, date };

  document.getElementById('m-icon').textContent = h.icon;
  document.getElementById('m-icon').style.color = h.color;
  document.getElementById('m-name').textContent = h.label;
  document.getElementById('m-date').textContent = formatDate(date);

  const saveBtn = document.getElementById('m-save');
  saveBtn.style.borderColor = h.color;
  saveBtn.style.color = h.color;

  const deleteBtn = document.getElementById('m-delete');
  deleteBtn.style.display = entry ? 'block' : 'none';

  const fields = document.getElementById('m-fields');
  fields.innerHTML = '';
  h.fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'field';
    const val = entry?.[f.key] || '';
    div.innerHTML = `<label>${f.label}</label><input type="${f.type}" id="field-${f.key}" value="${val}" placeholder="${f.placeholder}"/>`;
    fields.appendChild(div);
  });

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById(`field-${h.fields[0].key}`).focus();
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentModal = null;
}

function saveEntry() {
  if (!currentModal) return;
  const h = HABITS.find(x=>x.id===currentModal.habitId);
  const entry = {};
  let hasData = false;
  h.fields.forEach(f => {
    const val = document.getElementById('field-'+f.key)?.value || '';
    entry[f.key] = val;
    if (val) hasData = true;
  });
  if (!db[currentModal.date]) db[currentModal.date] = {};
  if (hasData) {
    db[currentModal.date][currentModal.habitId] = { ...entry, ts: Date.now() };
  } else {
    delete db[currentModal.date][currentModal.habitId];
  }
  saveDB();
  closeModalDirect();
  const activeView = document.querySelector('.view.active').id.replace('view-','');
  showView(activeView);
}

function deleteEntry() {
  if (!currentModal) return;
  if (db[currentModal.date]?.[currentModal.habitId]) {
    delete db[currentModal.date][currentModal.habitId];
    saveDB();
  }
  closeModalDirect();
  const activeView = document.querySelector('.view.active').id.replace('view-','');
  showView(activeView);
}

// ── HISTORY ──
let historyYear = new Date().getFullYear();
let historyMonth = new Date().getMonth();
let historyMode = 'month';

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTH_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function setHistoryMode(mode) {
  historyMode = mode;
  document.getElementById('toggle-month').style.borderColor = mode==='month' ? 'var(--text)' : 'var(--border)';
  document.getElementById('toggle-month').style.color = mode==='month' ? 'var(--text)' : 'var(--text-dim)';
  document.getElementById('toggle-year').style.borderColor = mode==='year' ? 'var(--text)' : 'var(--border)';
  document.getElementById('toggle-year').style.color = mode==='year' ? 'var(--text)' : 'var(--text-dim)';
  document.getElementById('month-nav').style.display = mode==='month' ? 'flex' : 'none';
  document.getElementById('year-nav').style.display = mode==='year' ? 'flex' : 'none';
  if (mode==='month') renderHistory();
  else renderYearView();
}

function changeMonth(delta) {
  historyMonth += delta;
  if (historyMonth > 11) { historyMonth = 0; historyYear++; }
  if (historyMonth < 0) { historyMonth = 11; historyYear--; }
  renderHistory();
}

function changeYear(delta) {
  historyYear += delta;
  renderYearView();
}

function renderYearView() {

  content.innerHTML = '';
  const todayStr = today();

    legend.appendChild(item);
  });

  // Build weekly data
  const jan1 = new Date(historyYear, 0, 1);
  const startDay = new Date(jan1);
  const dow = startDay.getDay();
  startDay.setDate(startDay.getDate() - (dow === 0 ? 6 : dow - 1));

  const weeks = [];
  for (let w = 0; w < 54; w++) {
    const weekStart = new Date(startDay);
    weekStart.setDate(startDay.getDate() + w * 7);
    if (weekStart.getFullYear() > historyYear && weekStart.getMonth() > 0) break;
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    if (weekEnd.getFullYear() < historyYear) continue;
    if (weekStart.getFullYear() > historyYear) break;
    weeks.push({ start: weekStart, end: weekEnd });
  }

  const weekData = weeks.map(w => {
    const counts = {};
    HABITS.forEach(h => { counts[h.id] = 0; });
    for (let i = 0; i < 7; i++) {
      const d = new Date(w.start);
      d.setDate(w.start.getDate() + i);
      if (d.getFullYear() !== historyYear) continue;
      const dateStr = d.toISOString().split('T')[0];
      HABITS.forEach(h => { if (db[dateStr]?.[h.id]) counts[h.id]++; });
    }
    return { ...w, counts };
  });

  const maxTotal = Math.max(...weekData.map(w => HABITS.reduce((s,h) => s + w.counts[h.id], 0)), 1);

  requestAnimationFrame(() => {
    const canvas = document.getElementById('yearBarChart');
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 320;
    const H = 180;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const padL = 24, padR = 8, padT = 12, padB = 8;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const barW = Math.max(2, (chartW / weeks.length) - 1);

    for (let m = 0; m < 12; m++) {
      const daysInMonth = new Date(historyYear, m+1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${historyYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        if (entry) {
          activeDays++;
          totalMin += parseInt(entry.minutes)||0;
          totalKm += parseFloat(entry.km)||0;
        }
      }

    const hours = Math.floor(totalMin/60);

    let monthsHTML = '';
    for (let m = 0; m < 12; m++) {
      const daysInMonth = new Date(historyYear, m+1, 0).getDate();

      let cellsHTML = ['D','L','M','M','J','V','S'].map(w =>
        `<div style="font-size:6px;color:var(--text-faint);text-align:center;padding-bottom:2px;">${w}</div>`
      ).join('');
      for (let i = 0; i < firstDay; i++) cellsHTML += '<div></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${historyYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const entry = db[dateStr]?.[h.id];
        const isToday = dateStr === todayStr;
        const isFuture = dateStr > todayStr;
        let bg, opacity = 1;
        if (entry) {
          let intensity = 0.35;
          if (h.id==='ciclismo' && entry.km) intensity = Math.min(1, parseFloat(entry.km)/60);
          else if (entry.minutes) intensity = Math.min(1, parseInt(entry.minutes)/120);
          bg = h.color; opacity = Math.max(0.25, intensity);
        } else {
          bg = 'var(--surface2)'; opacity = isFuture ? 0.15 : 0.7;
        }
        const outline = isToday ? 'outline:1px solid #C9B99A;' : '';
        const clickHandler = isFuture ? '' : 'openModal(\'' + h.id + '\',\'' + dateStr + '\')';
        cellsHTML += '<div onclick="' + clickHandler + '" style="aspect-ratio:1;border-radius:1px;background:' + bg + ';opacity:' + opacity + ';' + outline + 'cursor:' + (isFuture?'default':'pointer') + ';"></div>';
      }
      monthsHTML += `<div><div style="font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;">${MONTH_SHORT[m]}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">${cellsHTML}</div></div>`;
    }

    section.innerHTML = `
      <div class="heatmap-habit-header">
        <div class="heatmap-habit-icon" style="color:${h.color}">${h.icon}</div>
        <div class="heatmap-habit-name">${h.label}</div>
        <div class="heatmap-habit-total">${activeDays} días · ${totalStr}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px;">${monthsHTML}</div>
      <div style="height:1px;background:var(--border);margin:8px 0 24px;"></div>
    `;
    content.appendChild(section);
  });
}

function renderHistory() {
  const label = document.getElementById('history-month-label');
  label.textContent = `${MONTH_NAMES[historyMonth]} ${historyYear}`;
  const content = document.getElementById('history-content');
  content.innerHTML = '';
  const year = historyYear, month = historyMonth;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDayOfWeek = new Date(year, month, 1).getDay();
  const todayStr = today();

  let totalDaysActive = 0, totalSessions = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = db[dateStr];
    if (dayData && Object.keys(dayData).length > 0) { totalDaysActive++; totalSessions += Object.keys(dayData).length; }
  }

  const summary = document.createElement('div');
  summary.className = 'history-summary';
  summary.innerHTML = `
    <div class="history-summary-item"><div class="history-summary-value">${daysInMonth}</div><div class="history-summary-label">Días</div></div>
    <div class="history-summary-item"><div class="history-summary-value" style="color:#5A9E6F">${totalDaysActive}</div><div class="history-summary-label">Activos</div></div>
    <div class="history-summary-item"><div class="history-summary-value">${totalSessions}</div><div class="history-summary-label">Registros</div></div>
  `;
  content.appendChild(summary);

  HABITS.forEach(h => {
    const section = document.createElement('div');
    section.className = 'heatmap-section';
    let totalMin = 0, totalKm = 0, activeDays = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = db[dateStr]?.[h.id];
      if (entry) { activeDays++; totalMin += parseInt(entry.minutes)||0; totalKm += parseFloat(entry.km)||0; }
    }
    const hours = Math.floor(totalMin/60), mins = totalMin%60;
    const totalStr = h.id==='ciclismo' ? `${totalKm.toFixed(0)} km · ${hours>0?hours+'h ':''}${mins}m`
      : totalMin > 0 ? `${hours>0?hours+'h ':''}${mins}m` : activeDays > 0 ? `${activeDays} días` : '—';

    section.innerHTML = `
      <div class="heatmap-habit-header">
        <div class="heatmap-habit-icon" style="color:${h.color}">${h.icon}</div>
        <div class="heatmap-habit-name">${h.label}</div>
        <div class="heatmap-habit-total">${totalStr}</div>
      </div>
      <div class="heatmap-grid" id="heatmap-${h.id}"></div>
      <div style="height:1px;background:var(--border);margin:16px 0 20px;"></div>
    `;
    content.appendChild(section);

    const grid = section.querySelector(`#heatmap-${h.id}`);
    ['D','L','M','M','J','V','S'].forEach(day => {
      const lbl = document.createElement('div'); lbl.className = 'heatmap-day-label'; lbl.textContent = day; grid.appendChild(lbl);
    });
    for (let i = 0; i < firstDayOfWeek; i++) { const c = document.createElement('div'); c.className = 'heatmap-cell empty'; grid.appendChild(c); }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = db[dateStr]?.[h.id];
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell' + (dateStr===todayStr?' today-cell':'');
      if (entry) {
        let intensity = 0.4;
        if (h.id==='ciclismo' && entry.km) intensity = Math.min(1, parseFloat(entry.km)/60);
        else if (entry.minutes) intensity = Math.min(1, parseInt(entry.minutes)/120);
        cell.style.background = h.color; cell.style.opacity = Math.max(0.25, intensity);
      } else { cell.className += ' inactive'; cell.style.opacity = dateStr > todayStr ? '0.2' : '1'; }
      cell.onclick = () => { if (dateStr <= todayStr) openModal(h.id, dateStr); };
      grid.appendChild(cell);
    }
  });
}

// ── INIT ──
function init() {
  loadDB();
  const t = today();
  const d = new Date();
  document.getElementById('header-date').innerHTML = `${d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})}<br><span style="opacity:.5;font-size:10px;">${HABITS.filter(h=>getEntry(h.id,t)).length}/6 hoy</span>`;
  renderToday();
}

init();
</script>
</body>
</html>
